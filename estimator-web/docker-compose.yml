# Docker Compose for local Rails development.
# Mirrors the pattern used in ../estimator/docker-compose.yml (bind mount + hot
# reload + healthchecked dependency). Production is intentionally out of scope.

services:
  estimator-web:
    build: .
    container_name: estimator-web
    ports:
      - "3000:3000"

    env_file:
      - path: .env
        required: false

    # Explicit overrides so the service works even if .env is missing values.
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      RAILS_ENV: development
      # FastAPI estimator URL — server-side (Rails → FastAPI via docker DNS).
      ESTIMATOR_API_BASE_URL: http://estimator:8000
      # Public URL the *browser* uses for the SSE streaming endpoint.
      # Must be reachable from outside the docker network → host-mapped port.
      ESTIMATOR_API_PUBLIC_URL: http://localhost:8000
      # LLM calls over long transcriptions can take 1-2 min; leave plenty of head room.
      ESTIMATOR_AI_TIMEOUT: "180"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      # Full bind mount: any change in app/, config/, db/migrate/, etc. is seen
      # immediately by Rails autoloader and tailwindcss:watch.
      - .:/rails
      # Named volume so the bind mount above does not shadow installed gems.
      - bundle_cache:/usr/local/bundle
      # Defensive: if jsbundling is added later, node_modules stays inside.
      - node_modules:/rails/node_modules

    # Drop stale PID from previous runs, prepare DBs, then start foreman
    # (Puma + tailwindcss:watch via Procfile.dev).
    command: bash -c "rm -f tmp/pids/server.pid && bin/rails db:prepare && bin/dev"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/up"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5

    # Required for binding.irb / debug gem when attaching with `docker attach`.
    tty: true
    stdin_open: true

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: estimator-web-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # The development DB is created on first boot. The test DB is created by
      # `bin/rails db:prepare` during the web service command.
      POSTGRES_DB: estimator_web_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  bundle_cache:
  node_modules:
