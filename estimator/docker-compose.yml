# Docker Compose configuration for local development.
# For production, remove the bind mount and the --reload flag.

services:
  estimator:
    build: .
    container_name: estimator
    ports:
      - "8000:8000"

    # Load environment variables (API keys, config) from the local .env file.
    env_file:
      - .env

    # Override REDIS_URL for the in-network Redis service. The .env value
    # (redis://localhost:6379) is meant for running uvicorn outside Docker.
    environment:
      REDIS_URL: redis://redis:6379

    depends_on:
      redis:
        condition: service_healthy

    # Bind-mount the app/ directory so code changes are reflected immediately
    # inside the container without rebuilding the image. Tests too, so we can
    # run `pytest` against the live container during development.
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests

    # Override the default CMD to enable auto-reload on file changes.
    # Remove --reload for production deployments.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    restart: unless-stopped

    # Health check using Python's stdlib (curl is not available in slim images).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  redis:
    # Redis Stack bundles the RediSearch + RedisJSON modules that redisvl uses
    # to do vector similarity queries for the semantic cache. The vanilla
    # ``redis:7-alpine`` image does NOT ship these modules.
    image: redis/redis-stack:7.4.0-v0
    container_name: estimator-redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI (handy during the live demo)
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
