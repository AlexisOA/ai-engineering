# Master Compose for the monorepo. Pulls in each subproject's compose via the
# `include:` directive (Compose v2.20+). Running `docker compose up` from this
# directory launches all services on a single shared network, so cross-service
# calls (e.g. Rails -> FastAPI via http://estimator:8000) just work.
#
# IMPORTANT: each subproject can also be launched in isolation by running
# `docker compose up` from its own directory. Doing so creates a SEPARATE
# Compose project (and therefore separate named volumes), so the database from
# one mode is not visible from the other. Pick one mode per workflow and stick
# with it.

include:
  - estimator/docker-compose.yml
  - estimator-web/docker-compose.yml
